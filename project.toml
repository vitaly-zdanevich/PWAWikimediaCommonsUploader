# Cloud Native Buildpacks project descriptor for Toolforge's Ubuntu 24.04 builder.
[_]
schema-version = "0.2"

[[io.buildpacks.build.env]]
name = "RUSTFLAGS"
value = "-C target-cpu=x86-64"

[com.heroku.buildpacks.deb-packages]
install = [
    "ffmpeg",
    "imagemagick",
    "libheif1",
    "libraw-bin",
    "libvips-tools",
]
