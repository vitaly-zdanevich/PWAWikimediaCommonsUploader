name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.ver.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Detect version bump
        id: ver
        run: |
          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "deploy=yes" >> "$GITHUB_OUTPUT"
          elif git diff HEAD^ HEAD -- package.json | grep -q '"version"'; then
            echo "deploy=yes" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=no" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push' && steps.ver.outputs.deploy == 'yes'
        with:
          path: dist

  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Skip when Sonar token is absent
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured; skipping Sonar scan."
      - uses: actions/checkout@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: ${{ env.SONAR_TOKEN != '' }}
      - run: npm test -- --coverage
        if: ${{ env.SONAR_TOKEN != '' }}
      - uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        if: ${{ env.SONAR_TOKEN != '' }}

  deploy:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check.outputs.deploy == 'yes'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
